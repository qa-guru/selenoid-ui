<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selenoid UI — header preview</title>
    <link rel="stylesheet" href="selenoid.css" />
    <link rel="stylesheet" href="qa-guru-header.css" />
    <link rel="stylesheet" href="header.css" />
    <style>
      body {
        min-height: 100vh;
        padding-top: 0;
      }

      .preview-frame .header {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        width: 100%;
      }

      .preview-frame .nav-overlay {
        position: absolute;
      }

      .preview-page {
        width: min(1300px, calc(100% - 32px));
        margin: 0 auto;
        padding: var(--space-6) var(--space-4) var(--space-8);
      }

      .preview-title {
        margin: 0 0 var(--space-2);
        font-size: 1rem;
        font-weight: 500;
      }

      .preview-note {
        margin: 0 0 var(--space-5);
        color: var(--muted);
        font-size: 0.9rem;
      }

      .preview-controls {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2);
        margin-bottom: var(--space-5);
      }

      .preview-btn {
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg-panel);
        color: var(--text);
        padding: var(--space-2) var(--space-3);
        font: inherit;
        cursor: pointer;
      }

      .preview-btn:hover {
        border-color: rgba(89, 167, 129, 0.45);
      }

      .preview-frame {
        border: 1px dashed var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        margin-bottom: var(--space-5);
      }

      .preview-frame-label {
        padding: var(--space-2) var(--space-3);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.15);
        border-bottom: 1px solid var(--border);
      }

      .preview-frame--narrow {
        max-width: 420px;
      }

      .preview-frame--wide {
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="preview-page">
      <h1 class="preview-title">Header preview</h1>
      <p class="preview-note">
        Isolated sandbox for the stats bar. Open this file while tuning layout:
        <code>header-preview.html</code>
      </p>

      <div class="preview-controls">
        <button type="button" class="preview-btn" data-preset="ok">All connected</button>
        <button type="button" class="preview-btn" data-preset="stale">SSE stale</button>
        <button type="button" class="preview-btn" data-preset="error">Selenoid issue</button>
        <button type="button" class="preview-btn" data-toggle-filter>Toggle filter</button>
      </div>

      <div class="preview-frame preview-frame--wide">
        <div class="preview-frame-label">Wide (desktop)</div>
        <header class="header" id="header-wide"></header>
      </div>

      <div class="preview-frame preview-frame--narrow">
        <div class="preview-frame-label">Narrow (IDE panel ~420px)</div>
        <header class="header" id="header-narrow"></header>
      </div>
    </div>

    <script type="module">
      import { mountHeader, updateHeader, setHeaderFilterVisible } from "./header.js";

      const presets = {
        ok: { sse: "ok", selenoid: "ok", state: { total: 5, used: 2, pending: 1, queued: 0 } },
        stale: { sse: "stale", selenoid: "ok", state: { total: 5, used: 2, pending: 1, queued: 0 } },
        error: { sse: "ok", selenoid: "error", state: { total: 5, used: 5, pending: 0, queued: 3 } },
      };

      const wide = mountHeader(document.getElementById("header-wide"));
      const narrow = mountHeader(document.getElementById("header-narrow"));
      let filterVisible = true;

      function applyPreset(name) {
        const metrics = presets[name] || presets.ok;
        wide.update(metrics);
        narrow.update(metrics);
      }

      applyPreset("ok");

      document.querySelectorAll("[data-preset]").forEach((btn) => {
        btn.addEventListener("click", () => applyPreset(btn.dataset.preset));
      });

      document.querySelector("[data-toggle-filter]")?.addEventListener("click", () => {
        filterVisible = !filterVisible;
        setHeaderFilterVisible(wide.els, filterVisible);
        setHeaderFilterVisible(narrow.els, filterVisible);
      });
    </script>
  </body>
</html>
