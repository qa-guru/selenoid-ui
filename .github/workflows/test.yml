name: test

on:
  pull_request:

jobs:
  selenoid-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Golang
        uses: actions/setup-go@v4
        with:
          go-version: 1.26.5

      - uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Test
        run: ci/test.sh

      - name: Upload React Testing Library Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-ui-react-testing-library
          path: ui/allure-results/
          retention-days: 7

      - uses: codecov/codecov-action@v3
        with:
          flags: go
