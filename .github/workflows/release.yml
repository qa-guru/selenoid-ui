name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag for manual docker publish (e.g. v2.0.5)'
        required: true
        default: 'v2.0.5'

permissions:
  contents: write

jobs:
  selenoid-ui:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.release_meta.outputs.release_version }}
    steps:
      - uses: actions/checkout@v7

      - name: Set Golang
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.5

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: actions/setup-node@v6
        with:
          node-version: 12.x

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v6
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Test
        if: github.event_name == 'release'
        run: ci/test.sh

      - name: Build
        run: ci/build.sh

      - name: Prepare release version
        id: release_meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF#refs/tags/}"
          fi
          echo "release_version=${version}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"

      - uses: AButler/upload-release-assets@v4.0
        if: github.event_name == 'release'
        with:
          files: 'dist/*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid-ui
        run: ci/docker-push.sh $RELEASE_VERSION

      - name: Latest release image
        if: github.event_name == 'release'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid-ui
        run: ci/docker-push.sh latest-release

  deploy-smoke:
    name: Release smoke → selenoid-tests
    needs: selenoid-ui
    if: success()
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/smoke-trigger-callback.yml
    secrets:
      SELENOID_TESTS_DISPATCH_TOKEN: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
    with:
      test_tags: api,smoke
      source_version: ${{ needs.selenoid-ui.outputs.release_version }}
      source_ref: ${{ github.ref }}
      summary_title: Release smoke → selenoid-tests
