name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag for manual docker publish (e.g. v2.0.5)'
        required: true
        default: 'v2.0.5'

permissions:
  contents: write

jobs:
  selenoid-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Golang
        uses: actions/setup-go@v5
        with:
          go-version: ~1.23.8

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: actions/setup-node@v4
        with:
          node-version: 12.x

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Test
        if: github.event_name == 'release'
        run: ci/test.sh

      - name: Build
        run: ci/build.sh

      - name: Prepare release version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - uses: AButler/upload-release-assets@v3.0
        if: github.event_name == 'release'
        with:
          files: 'dist/*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid-ui
        run: ci/docker-push.sh $RELEASE_VERSION

      - name: Latest release image
        if: github.event_name == 'release'
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid-ui
        run: ci/docker-push.sh latest-release

      - name: Trigger selenoid-tests smoke
        if: success()
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SELENOID_TESTS_DISPATCH_TOKEN }}
          repository: qa-guru/selenoid-tests
          event-type: deploy-smoke
          client-payload: >-
            {"source_repo":"${{ github.repository }}",
             "source_ref":"${{ github.ref }}",
             "source_version":"${{ env.RELEASE_VERSION }}",
             "test_tags":"api,smoke"}
