name: docker-publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image tag (e.g. v2.0.5 or latest-release)"
        required: true
        default: "v2.0.5"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Golang
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build
        run: ci/build.sh
        env:
          VITE_HUB_ACCESS_KEY: ${{ secrets.HUB_ACCESS_KEY }}
          VITE_HUB_AUTH_USER: ${{ secrets.HUB_AUTH_USER }}
          VITE_HUB_AUTH_PASS: ${{ secrets.HUB_AUTH_PASS }}

      - name: Push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: qaguru/selenoid-ui
        run: ci/docker-push.sh "${{ inputs.version }}"
